<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трекер расходов</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="mb-4">💰 Трекер расходов</h1>
        
        <div class="row">
            <!-- Форма добавления -->
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">➕ Добавить расход</h5>
                    </div>
                    <div class="card-body">
                        <form action="/add" method="POST">
                            <div class="mb-3">
                                <label for="category" class="form-label">Категория</label>
                                <select name="category" id="category" class="form-select" required>
                                    <option value="На еду">На еду</option>
                                    <option value="Одежда">Одежда</option>
                                    <option value="Развлечение">Развлечение</option>
                                    <option value="Комуналка и содержание жилья">Комуналка и содержание жилья</option>
                                    <option value="Заправка авто">Заправка авто</option>
                                    <option value="Содержание авто">Содержание авто</option>
                                    <option value="Прочие">Прочие</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="amount" class="form-label">Сумма (руб.)</label>
                                <input type="number" name="amount" id="amount" class="form-control" step="0.01" min="0.01" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Добавить</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <!-- Статистика и категории -->
            <div class="col-md-8">
                <!-- Статистика -->
                <div class="row mb-4">
                    <div class="col-md-4">
                        <div class="card text-white bg-primary">
                            <div class="card-body">
                                <h6 class="card-title">За сегодня</h6>
                                <h3>{{ stats.today }} ₽</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-white bg-warning">
                            <div class="card-body">
                                <h6 class="card-title">За неделю</h6>
                                <h3>{{ stats.week }} ₽</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-white bg-info">
                            <div class="card-body">
                                <h6 class="card-title">Всего</h6>
                                <h3>{{ stats.total }} ₽</h3>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Категории -->
                <div class="card shadow-sm">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">📊 Категории</h5>
                        <a href="/history" class="btn btn-sm btn-outline-primary">📋 История</a>
                    </div>
                    <div class="card-body">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>Категория</th>
                                    <th class="text-end">Сумма</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for row in categories %}
                                <tr>
                                    <td>{{ row['category'] }}</td>
                                    <td class="text-end"><strong>{{ row['sum_value'] }} ₽</strong></td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
