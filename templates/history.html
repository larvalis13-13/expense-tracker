<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История транзакций</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>📋 История транзакций</h1>
            <div>
                <a href="/" class="btn btn-outline-secondary me-2">← Назад</a>
                <a href="/export" class="btn btn-success">📥 Экспорт CSV</a>
            </div>
        </div>
        
        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Категория</th>
                            <th>Сумма</th>
                            <th>Дата и время</th>
                            <th>Действие</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for t in transactions %}
                        <tr>
                            <td>{{ t['id'] }}</td>
                            <td>{{ t['category'] }}</td>
                            <td class="text-danger">-{{ t['amount'] }} ₽</td>
                            <td>{{ t['date'] }}</td>
                            <td>
                                <form action="/delete/{{ t['id'] }}" method="POST" 
                                      onsubmit="return confirm('Удалить транзакцию #{{ t['id'] }}?');" 
                                      style="display: inline;">
                                    <button type="submit" class="btn btn-sm btn-danger">✕</button>
                                </form>
                            </td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="5" class="text-center text-muted">История пуста</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
